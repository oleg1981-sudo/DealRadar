# Scheduled cost-guardrail sweep (v3.1 NFR-COST-1/2/3, task T-INF-9).
#
# Runs scripts/check-budgets.mjs, which checks the two MEASURABLE budget
# dimensions (DB row count, AWIN feed egress) against their thresholds and
# reports GitHub Actions minutes / Vertex-LLM token spend as clearly-labeled
# UNMEASURED stubs (no billing-API access wired up from this repo). The job
# only fails on a measurable breach — an unmeasured check never fails it.
#
# Required repository secret (Settings → Secrets and variables → Actions):
#   SUPABASE_DB_URL   direct Postgres connection string
#                      (Supabase → Project Settings → Database → Connection string)
name: Cost guardrail

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: cost-guardrail
  cancel-in-progress: false

jobs:
  check-budgets:
    if: github.repository_owner == 'oleg1981-sudo'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure psql is available
        run: psql --version || (sudo apt-get update && sudo apt-get install -y postgresql-client)

      - name: Check cost budgets
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/check-budgets.mjs --strict
