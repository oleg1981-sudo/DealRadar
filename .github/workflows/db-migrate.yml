# Apply the database schema/migrations.
#
# The schema (supabase/schema.sql) is idempotent, so this runs safely on every
# push to main that touches it, and can be triggered manually any time.
#
# Required repository secret (Settings → Secrets and variables → Actions):
#   SUPABASE_DB_URL  direct Postgres connection string
#                    (Supabase → Project Settings → Database → Connection string)
name: Apply DB schema

on:
  push:
    branches: [main]
    paths:
      - 'supabase/schema.sql'
      - 'scripts/apply-schema.mjs'
      - '.github/workflows/db-migrate.yml'
  workflow_dispatch:

concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    if: github.repository_owner == 'oleg1981-sudo'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # RSK-14 / T-DB-0 guard: schema.sql executes top-to-bottom with
      # last-definition-wins, so a duplicated create-or-replace silently
      # shadows the earlier body (this broke record_price_history once).
      # Fail BEFORE applying if any function or trigger is defined twice.
      - name: Guard — one definition per function/trigger
        run: |
          dups=$(grep -oiE 'create or replace function public\.[a-z_]+|^create trigger [a-z_]+' supabase/schema.sql | tr '[:upper:]' '[:lower:]' | sort | uniq -d)
          if [ -n "$dups" ]; then
            echo "::error::Duplicate definitions in supabase/schema.sql (last-definition-wins hazard):"
            echo "$dups"
            exit 1
          fi
          echo "OK — no duplicate function/trigger definitions"

      - name: Ensure psql is available
        run: psql --version || (sudo apt-get update && sudo apt-get install -y postgresql-client)

      - name: Apply schema
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret not set — with owner-gating (FR-3.3) this job only runs where secrets must exist [FR-3.4]"
            exit 1
          fi
          node scripts/apply-schema.mjs
