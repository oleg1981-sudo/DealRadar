# Apply the database schema/migrations.
#
# The schema (supabase/schema.sql) is idempotent, so this runs safely on every
# push to main that touches it, and can be triggered manually any time.
#
# Required repository secret (Settings → Secrets and variables → Actions):
#   SUPABASE_DB_URL  direct Postgres connection string
#                    (Supabase → Project Settings → Database → Connection string)
name: Apply DB schema

on:
  push:
    branches: [main]
    paths:
      - 'supabase/schema.sql'
      - 'scripts/apply-schema.mjs'
      - '.github/workflows/db-migrate.yml'
  workflow_dispatch:

concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure psql is available
        run: psql --version || (sudo apt-get update && sudo apt-get install -y postgresql-client)

      - name: Apply schema
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL secret not set — skipping migration"
            exit 0
          fi
          node scripts/apply-schema.mjs
