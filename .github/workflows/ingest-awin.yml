# Scheduled AWIN feed ingestion.
#
# AWIN ships one large combined product feed (gzipped CSV), not a search API, so
# it is ingested here on a schedule rather than via /api/refresh. This downloads
# the feed, keeps genuine in-stock discounts, and upserts them into Supabase.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   AWIN_FEED_URL              the datafeed download URL (embeds the API key — secret)
#   SUPABASE_URL               your Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY  service-role key (server-only, bypasses RLS)
#
# Run it manually any time from the Actions tab ("Run workflow"); tick "dry_run"
# to preview without writing.
name: Ingest AWIN feed

on:
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC (low-traffic window)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no Supabase writes)'
        type: boolean
        default: false

concurrency:
  group: ingest-awin
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The script is dependency-free (Node built-ins + Supabase REST), so no install step.
      - name: Run AWIN ingestion
        env:
          AWIN_FEED_URL: ${{ secrets.AWIN_FEED_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/ingest-awin.cjs
          else
            node scripts/ingest-awin.cjs --upsert
          fi

      # [GAP-2] Feed-ingested deals bypass /api/refresh, so dispatch price-drop
      # alerts for the rows just written. Non-fatal if the app URL is unset.
      - name: Dispatch price-drop alerts for ingested deals
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$APP_URL" ] && [ -n "$CRON_SECRET" ]; then
            curl -fsS -X POST "$APP_URL/api/refresh-alerts" \
              -H "Authorization: Bearer $CRON_SECRET" \
              -H "Content-Type: application/json" \
              -d '{"sinceMinutes":180}' || echo "refresh-alerts call failed (non-fatal)"
          else
            echo "APP_URL or CRON_SECRET not set — skipping alert dispatch"
          fi
