# Scheduled AWIN feed ingestion.
#
# AWIN ships one large combined product feed (gzipped CSV), not a search API, so
# it is ingested here on a schedule rather than via /api/refresh. This downloads
# the feed, keeps genuine in-stock discounts, and upserts them into Supabase.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   AWIN_FEED_URL              the datafeed download URL (embeds the API key — secret)
#   SUPABASE_URL               your Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY  service-role key (server-only, bypasses RLS)
#
# Run it manually any time from the Actions tab ("Run workflow"); tick "dry_run"
# to preview without writing.
name: Ingest AWIN feed

on:
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC (low-traffic window)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no Supabase writes)'
        type: boolean
        default: false

concurrency:
  group: ingest-awin
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The script is dependency-free (Node built-ins + Supabase REST), so no install step.
      - name: Run AWIN ingestion
        env:
          AWIN_FEED_URL: ${{ secrets.AWIN_FEED_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/ingest-awin.cjs
          else
            node scripts/ingest-awin.cjs --upsert
          fi

      # New variants of known-buggy merchant pages (price swaps after JS) must
      # inherit the homepage exclusion — the ingest alone leaves them visible.
      - name: Sync homepage-hidden flags
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/flag-homepage-hidden.cjs
          else
            node scripts/flag-homepage-hidden.cjs --apply
          fi

      # Record today's prices into price_history (real cardiogram data). The
      # verify workflow re-snapshots the same UTC day later with live-checked
      # prices — idempotent upsert, so that pass wins.
      - name: Snapshot prices into price_history
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/snapshot-prices.cjs
          else
            node scripts/snapshot-prices.cjs --apply
          fi
