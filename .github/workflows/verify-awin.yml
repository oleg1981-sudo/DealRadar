# Live-shop price/stock verification — runs daily, two hours after the feed
# ingestion. Checks each AWIN deal against the merchant's live Shopify page and
# updates prices / hides sold-out, no-longer-discounted or gone items. Daily
# (not every 2 days) because the feed mislabels some merchants' currency
# (e.g. Kuishi GBP-as-EUR): a new product's price is only trustworthy after
# this has checked it, so the wrong-price window must stay under a day.
#
# Required repository secrets (same as the ingestion):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
#
# Run manually from the Actions tab any time; tick "dry_run" to preview.
name: Verify AWIN deals

on:
  schedule:
    - cron: '0 5 * * *' # daily at 05:00 UTC (after the 03:00 ingest)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no writes)'
        type: boolean
        default: false

concurrency:
  group: verify-awin
  cancel-in-progress: false

jobs:
  verify:
    if: github.repository_owner == 'oleg1981-sudo'
    runs-on: ubuntu-latest
    # Budget arithmetic (2026-07-19, catalog ~33.3k rows, ~10k fetchable):
    # verify --max-minutes 105 + enrich --max-minutes 25 + snapshot ~5 +
    # promote ~5 + IndexNow ~2 < 150-min job timeout (~8 min margin). The sweep can NEVER finish exhaustively in one
    # run (t23.intelliad.de alone holds ~22.9k redirect rows; ROCKBROS ~4.6k)
    # — the soft budgets stop each step cleanly so every later step always
    # runs, and stalest-first ordering (Stage 2) rotates coverage across runs.
    # Patches flush incrementally (every 50), so a budget stop loses nothing.
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify deals against live shops
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/verify-awin.cjs --max-minutes 105
          else
            node scripts/verify-awin.cjs --apply --max-minutes 105
          fi

      # Top up sparse galleries from the live shop (feeds like BlazeVideo ship
      # a single image; the deal page should show the same multi-image gallery
      # for every product). Only touches deals with fewer than 2 real images.
      # Per-step policy [FR-3.1]: post-verify steps are data-preserving and run
      # even if an earlier step failed (!cancelled()) — a verify failure must
      # not starve enrichment, snapshots, or indexing pings.
      - name: Enrich sparse galleries from live shops
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/enrich-galleries.cjs --max-minutes 25
          else
            node scripts/enrich-galleries.cjs --apply --max-minutes 25
          fi

      # Re-snapshot today's prices now that they are live-verified — same UTC
      # day as the ingest's snapshot, so this upsert overwrites it and the
      # verified price is what price_history keeps for the day.
      - name: Snapshot prices into price_history
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/snapshot-prices.cjs
          else
            node scripts/snapshot-prices.cjs --apply
          fi

      # Price-drop promotion [Q-2/P1-7]: hidden rows with no compare-at proof
      # can still publish when their own tracked price drops ≥10% below a
      # ≥7-day baseline. Optional route — never gates indexation (EC-24).
      - name: Promote proven price drops
        if: ${{ !cancelled() && github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/promote-price-drops.cjs --apply

      # Ping IndexNow with visible deals the verifier changed (live price
      # corrections, promotions). Hidden PDPs serve 200+noindex (Q-1) and are
      # excluded by the submit script (interim FR-3.6). The script retries
      # transient errors; a persistent failure now fails this step loudly.
      - name: Submit changed deals to IndexNow
        if: ${{ !cancelled() && github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/indexnow-submit.cjs --since 3
