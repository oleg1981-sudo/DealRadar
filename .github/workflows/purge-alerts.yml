# Scheduled GDPR retention sweep for price_alerts.
#
# Calls POST /api/purge-alerts (protected by CRON_SECRET), which runs the
# purge_stale_price_alerts SQL function: deletes subscriptions past the retention
# window (365d) and notified rows past a shorter window (30d). This is the data
# side of NFR-PRIV-1 (R-MAIL-5) — personal data is not retained indefinitely.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   APP_URL      the deployed app base URL (e.g. https://dealradar.eu)
#   CRON_SECRET  shared secret guarding the cron endpoints
name: Purge stale price alerts

on:
  schedule:
    - cron: '0 5 * * *' # daily at 05:00 UTC
  workflow_dispatch:

concurrency:
  group: purge-alerts
  cancel-in-progress: false

jobs:
  purge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call purge endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$APP_URL" ] && [ -n "$CRON_SECRET" ]; then
            curl -fsS -X POST "$APP_URL/api/purge-alerts" \
              -H "Authorization: Bearer $CRON_SECRET" \
              -H "Content-Type: application/json" \
              -d '{"retentionDays":365,"notifiedDays":30}'
          else
            echo "APP_URL or CRON_SECRET not set — skipping purge"
          fi
